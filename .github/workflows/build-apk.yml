name: Build APK

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 34
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Grant Gradle wrapper permission
        run: chmod +x ./gradlew

      - name: Restore signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            mkdir -p .ci
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > .ci/yamibo-stable.jks
          fi

      - name: Build debug APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/.ci/yamibo-stable.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: ./gradlew --no-daemon assembleDebug

      - name: Prepare APK
        shell: bash
        run: |
          mkdir -p release
          cp "app/build/outputs/apk/debug/300 Lite.apk" \
            "release/300 Lite.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 300 Lite-${{ github.run_number }}
          path: release/300 Lite.apk
          if-no-files-found: error
          retention-days: 30

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: release/300 Lite.apk
