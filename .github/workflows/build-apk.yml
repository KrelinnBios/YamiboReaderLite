name: Build APK
run-name: ${{ github.event.release.tag_name || github.ref_name }}

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

# Run all JavaScript actions on Node.js 24 (Node 20 is deprecated on GitHub runners,
# forced to Node 24 from 2026-06-16 and removed 2026-09-16). Belt-and-suspenders with
# the pinned action versions below so no step falls back to the removed Node 20 runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          # 有了密钥才能把 Gradle 配置缓存跨 run 持久化（缓存里含敏感信息，必须加密存储）。
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK 34
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Grant Gradle wrapper permission
        run: chmod +x ./gradlew

      # Release 触发时版本号必须从 tag 推导，否则 APK 永远是 build.gradle.kts 里的
      # 默认版本（1.0.0/3），应用内更新会把新版误判为已安装版本，提示死循环。
      - name: Derive app version from release tag
        if: github.event_name == 'release'
        shell: bash
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          tag="${RELEASE_TAG_NAME:-${GITHUB_REF_NAME:-}}"
          if ! [[ "$tag" =~ ^v?[0-9]+(\.[0-9]+)*$ ]]; then
            echo "❌ Release tag '$tag' is not a version number (expected e.g. v1.0.1)."
            exit 1
          fi
          echo "APP_VERSION_NAME=${tag#v}" >> "$GITHUB_ENV"
          echo "APP_VERSION_CODE=${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Validate signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          missing=()
          [ -z "$ANDROID_KEYSTORE_BASE64" ] && missing+=("ANDROID_KEYSTORE_BASE64")
          [ -z "$ANDROID_KEY_ALIAS" ]       && missing+=("ANDROID_KEY_ALIAS")
          [ -z "$ANDROID_KEY_PASSWORD" ]    && missing+=("ANDROID_KEY_PASSWORD")
          [ -z "$ANDROID_STORE_PASSWORD" ]  && missing+=("ANDROID_STORE_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required signing secrets: ${missing[*]}"
            echo "Please add them in Settings → Secrets → Actions."
            exit 1
          fi

      - name: Restore signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p .ci
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > .ci/yamibo-stable.jks

      # 发版前先跑单元测试，核心模块（解析/URL/会话/屏蔽/更新解析等）出回归直接卡住，
      # 避免坏版本打包发布后被应用内更新推送给用户。
      # 不加 --no-daemon：让下一步 assembleRelease 复用同一个已热身的守护进程，
      # 省掉第二次 JVM 冷启动和项目配置；job 结束由 setup-gradle 负责清理。
      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/.ci/yamibo-stable.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: ./gradlew assembleRelease

      # 校验产物确实被正确签名，避免「Gradle 没报错但实际未签名/签错」流出。
      - name: Verify APK signature
        shell: bash
        run: |
          apksigner="$ANDROID_HOME/build-tools/34.0.0/apksigner"
          if [ ! -x "$apksigner" ]; then
            echo "❌ apksigner not found at $apksigner"
            exit 1
          fi
          "$apksigner" verify --verbose --print-certs \
            "app/build/outputs/apk/release/300 Lite.apk"

      - name: Prepare APK
        shell: bash
        run: |
          mkdir -p release
          cp "app/build/outputs/apk/release/300 Lite.apk" \
            "release/300 Lite.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: 300 Lite-${{ github.run_number }}
          path: release/300 Lite.apk
          if-no-files-found: error
          retention-days: 30

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release/300 Lite.apk
