name: Notify profile language chart

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send code-pushed event
        env:
          GH_TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}
        run: >-
          gh api --method POST
          repos/KrelinnBios/KrelinnBios/dispatches
          -f event_type=code-pushed
