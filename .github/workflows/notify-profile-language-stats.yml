name: 通知主页更新语言占比图

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "**/*.mdx"
      - "**/*.markdown"

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      PROFILE_REPO_TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}

    steps:
      - name: 通知主页仓库
        if: ${{ env.PROFILE_REPO_TOKEN != '' }}
        run: |
          curl --fail-with-body --request POST \
            --url "https://api.github.com/repos/KrelinnBios/KrelinnBios/dispatches" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${PROFILE_REPO_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data '{"event_type":"code-pushed","client_payload":{"repository":"${{ github.repository }}","sha":"${{ github.sha }}"}}'
